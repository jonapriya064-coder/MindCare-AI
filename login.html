{% extends "layout.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-page d-flex align-items-center min-vh-100 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">

                <!-- Logo -->
                <div class="text-center mb-4">
                    <div class="auth-logo">🧠</div>
                    <h3 class="fw-bold mt-3">Welcome Back</h3>
                    <p class="text-muted">Sign in to continue your wellness journey.</p>
                </div>

                <!-- Form Card -->
                <div class="auth-card">
                    <form method="POST" action="{{ url_for('login') }}" novalidate>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" id="passwordField" class="form-control" placeholder="••••••••" required>
                                <button type="button" class="input-group-text bg-transparent border-start-0 cursor-pointer" onclick="togglePassword()">
                                    <i class="bi bi-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-3">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>
                    </form>

                    <hr class="my-4">
                    <p class="text-center text-muted mb-0">
                        Don't have an account? 
                        <a href="{{ url_for('register') }}" class="text-primary fw-bold">Create one</a>
                    </p>
                </div>

                <!-- Emergency Link -->
                <div class="text-center mt-4">
                    <a href="{{ url_for('emergency') }}" class="text-danger small">
                        <i class="bi bi-telephone me-1"></i>Need emergency support?
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const field = document.getElementById('passwordField');
    const icon = document.getElementById('eyeIcon');
    if (field.type === 'password') {
        field.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        field.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
{% endblock %}
