{% extends "layout.html" %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="container text-center py-5 min-vh-100 d-flex align-items-center justify-content-center">
    <div>
        <div style="font-size:6rem">🧩</div>
        <h1 class="display-1 fw-bold text-primary">404</h1>
        <h3 class="fw-bold mb-3">Page Not Found</h3>
        <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
        <div class="d-flex justify-content-center gap-3">
            {% if session.user_id %}
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary rounded-pill px-4">
                <i class="bi bi-house me-2"></i>Go to Dashboard
            </a>
            {% else %}
            <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-4">
                <i class="bi bi-house me-2"></i>Go Home
            </a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
